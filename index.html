<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>neilbuilds</title>
  <meta name="description" content="Neil B. — building small, fun web apps." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.6;
    }
    .container { max-width: 640px; width: 100%; }
    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p.tagline {
      font-size: 1.25rem;
      color: #a0a0a0;
      margin-bottom: 3rem;
    }
    .section {
      border-top: 1px solid #222;
      padding: 1.75rem 0;
    }
    .section h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #666;
      margin-bottom: 1rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .links a, .links span {
      color: #f5f5f5;
      text-decoration: none;
      padding: 0.5rem 0;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s ease;
      display: inline-block;
      width: fit-content;
    }
    .links a:hover { border-color: #f5f5f5; }
    .links span.soon {
      color: #555;
      font-style: italic;
    }
    footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #555;
      border-top: 1px solid #222;
      padding-top: 1.5rem;
    }
    footer a { color: #888; text-decoration: none; border-bottom: 1px solid #333; }
    footer a:hover { color: #f5f5f5; border-color: #f5f5f5; }
  </style>
</head>
<body>
  <div class="container">
    <h1>neilbuilds</h1>
    <p class="tagline">Small, fun web apps. Data + AI by day, side projects by night.</p>

    <div class="section">
      <h2>Movies</h2>
      <div class="links">
        <a href="https://patriot.neilbuilds.com">Patriot — US Release</a>
        <a href="https://patriot-mission2.vercel.app/">Patriot — The Game</a>
        <a href="https://drishyam3.neilbuilds.com">Drishyam 3 — US Release</a>
      </div>
    </div>

    <div class="section">
      <h2>Red Bull</h2>
      <div class="links">
        <a href="https://rbpitwall.lovable.app/">Pit Wall</a>
        <a href=" rbna-ai-buildday.vercel.app">AI Build Day — Judge Site</a>
      </div>
    </div>

    <div class="section">
      <h2>Builds</h2>
      <div class="links">
        <span class="soon">Bible Quiz — coming soon</span>
        <span class="soon">Pilot License Test App — coming soon</span>
      </div>
    </div>

    <footer>
      <a href="https://github.com/neilbuilds">github</a>
    </footer>
  </div>
</body>
</html>
