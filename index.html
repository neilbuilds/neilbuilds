<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>neilbuilds</title>
  <meta name="description" content="Neil B. — building small, fun web apps." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.6;
    }
    .container { max-width: 560px; }
    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p.tagline {
      font-size: 1.25rem;
      color: #a0a0a0;
      margin-bottom: 2.5rem;
    }
    .projects {
      border-top: 1px solid #222;
      padding-top: 2rem;
    }
    .projects h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
      margin-bottom: 1rem;
    }
    .project {
      color: #888;
      font-style: italic;
    }
    footer {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: #555;
    }
    a { color: #f5f5f5; text-decoration: none; border-bottom: 1px solid #444; }
    a:hover { border-color: #f5f5f5; }
  </style>
</head>
<body>
  <div class="container">
    <h1>neilbuilds</h1>
    <p class="tagline">Small, fun web apps. Data + AI by day, side projects by night.</p>

    <div class="projects">
      <h2>Currently shipping</h2>
      <p class="project">Projects coming soon — first one drops this week.</p>
    </div>

    <footer>
      <a href="https://github.com/neilbuilds">github</a>
    </footer>
  </div>
</body>
</html>
